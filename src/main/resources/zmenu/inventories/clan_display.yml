size: 54
name: "<#C084FC>Clan Display"

patterns:
  - "byteclans-decoration"

items:

  # Navigation
  main-menu:
    slot: 49
    type: HOME
    item:
      material: SPRUCE_DOOR
      name: "<#FB7185>Return to Main Menu"
      lore:
      - ""
      - "<#D1D5DB>Go back to the main"
      - "<#D1D5DB>clan management menu."
      - ""
      - "<#6EE7B7>▶ Click to return"
    sound: UI_BUTTON_CLICK

    # Presets
  presets:
    slot: 50
    type: INVENTORY
    inventory: "clan_display_presets"
    item:
      material: NETHER_STAR
      name: "<gradient:#8B5CF6:#EC4899>Display Presets"
      lore:
      - ""
      - "<#D1D5DB>Choose from a collection of"
      - "<#D1D5DB>beautiful animated gradients,"
      - "<#D1D5DB>bold styles and premium colors."
      - ""
      - "<#9CA3AF>Includes neon, galaxy, royal,"
      - "<#9CA3AF>fire, ocean and more themes."
      - ""
      - "<#6EE7B7>▶ Click to browse presets"
    sound: UI_BUTTON_CLICK

  # White
  white:
    slot: 11
    item:
      material: WHITE_BED
      name: "<white>%byteclans_clan_name%"
      lore:
      - ""
      - "<gray>Classic clean white display."
      - ""
      - "<green>▶ Click to apply"
    actions:
      - type: close
      - type: set-clan-display
        display: "<white>{clan_name}</white>"
      - type: message
        messages:
        - "<green>You changed your clan display to %byteclans_clan_display%"
      - type: sound
        sound: UI_BUTTON_CLICK

