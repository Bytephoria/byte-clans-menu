size: 54
name: "<#34D399>Clan Members"

patterns:
  - "byteclans-decoration"
  
items:

  # Previous Page
  previous-page:
    type: PREVIOUS
    slot: 46
    is-permanent: true
    view-requirement:
      requirements:
        - type: placeholder
          placeholder: "%zmenu_player_page%"
          action: SUPERIOR
          value: "%zmenu_player_max_page%"
    item:
      material: ARROW
      name: "<#EF4444>← Previous Page"
      lore:
      - ""
      - "<#D1D5DB>Go to the previous page"
      - "<#D1D5DB>of clan members."
      - ""
      - "<#6EE7B7>▶ Click to continue"
    else:
      item:
        material: BLACK_STAINED_GLASS_PANE
        name: " "
    sound: item.book.page_turn

  # Next Page
  next-page:
    type: NEXT
    slot: 52
    is-permanent: true
    view-requirement:
      requirements:
        - type: placeholder
          placeholder: "%zmenu_player_page%"
          action: LOWER
          value: "%zmenu_player_max_page%"
    item:
      material: ARROW
      name: "<#22C55E>Next Page →"
      lore:
      - ""
      - "<#D1D5DB>Go to the next page"
      - "<#D1D5DB>of clan members."
      - ""
      - "<#6EE7B7>▶ Click to continue"
    else:
      item:
        material: BLACK_STAINED_GLASS_PANE
        name: " "
    sound: item.book.page_turn

  # Previous Menu
  previous-menu:
    slot: 49
    is-permanent: true
    type: HOME
    item:
      material: SPRUCE_DOOR
      name: "<#FB7185>Return to Main Menu"
      lore:
      - ""
      - "<#D1D5DB>Go back to the main"
      - "<#D1D5DB>clan management menu."
      - ""
      - "<#6EE7B7>▶ Click to return"
    sound: UI_BUTTON_CLICK

  # Clan Member Item
  clan-member-item:
    type: BYTECLANS_CLAN_MEMBER_ITEM
    slots:
    - 10-16
    - 19-25
    - 28-34
    item:
      material: PLAYER_HEAD
      name: "<#34D399>%name%"
      lore:
      - ""
      - "<#D1D5DB>Role: <#A78BFA>%role_display%</#A78BFA> <gray>(%role_id%)</gray>"
      - "<#D1D5DB>Joined: <#6EE7B7>%joined_at%</#6EE7B7>"
      - "<#D1D5DB>Last Seen: <#FBBF24>%last_seen_at%</#FBBF24>"
      - ""
      - "<#D1D5DB>Kills: <#FBBF24>%kills%</#FBBF24>"
      - "<#D1D5DB>Deaths: <#FBBF24>%deaths%</#FBBF24>"
      - "<#D1D5DB>Kdr: <#FBBF24>%kdr%</#FBBF24>"
      - ""
      - "<#9CA3AF>Clan member information"